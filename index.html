<div id="login-screen">
    <div class="box">
        <h1 id="start-logo">КГТД</h1>
        <input type="text" id="nickname" placeholder="Твой ник..." maxlength="15">
        
        <p style="font-size: 12px; color: #666; margin-bottom: 10px;">ВЫБЕРИ СВОЙ КЛАН:</p>
        <div id="clan-selector" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <div class="clan-opt" onclick="selectClan('🏴‍☠️', this)">🏴‍☠️</div>
            <div class="clan-opt" onclick="selectClan('🛡️', this)">🛡️</div>
            <div class="clan-opt" onclick="selectClan('💊', this)">💊</div>
            <div class="clan-opt" onclick="selectClan('🔥', this)">🔥</div>
            <div class="clan-opt" onclick="selectClan('👁️', this)">👁️</div>
        </div>

        <button class="enter-btn" onclick="enterKGTD()">ВСТУПИТЬ</button>
    </div>
</div>

<style>
    /* Добавь это в свои стили */
    .clan-opt { 
        font-size: 24px; cursor: pointer; padding: 10px; border: 2px solid transparent; 
        border-radius: 12px; transition: 0.2s; background: #111;
    }
    .clan-opt.selected { border-color: #00ff88; background: #00ff8822; transform: scale(1.1); }
</style>
