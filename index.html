<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>КГТД —Ты в теме</title> 
    
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        header { 
            padding: 15px; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 10;
        }
        
        #logo { font-weight: 900; letter-spacing: 2px; font-size: 20px; }
        
        #feed { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }
        
        .post { 
            border-bottom: 1px solid #222; padding: 15px 0; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .post-header { font-weight: bold; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        .post-content { font-size: 16px; line-height: 1.4; white-space: pre-wrap; }

        /* Поле ввода для мобилок */
        #input-area { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 1px solid #333; padding: 10px;
            display: flex; gap: 10px;
        }
        #post-input { 
            flex: 1; background: #111; border: 1px solid #333; 
            color: #fff; padding: 12px; font-size: 16px; border-radius: 20px; outline: none;
        }

        /* Экран входа */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; 
        }
        .box { width: 85%; max-width: 350px; text-align: center; }
        .box h1 { font-size: 40px; margin-bottom: 20px; }
        input[type="text"]#nickname { 
            width: 100%; padding: 15px; background: #111; color: #fff; 
            border: 1px solid #333; border-radius: 10px; margin-bottom: 15px; font-size: 18px; 
        }
        .enter-btn { 
            width: 100%; padding: 15px; background: #fff; color: #000; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; 
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h1>ИТД</h1>
        <input type="text" id="nickname" placeholder="Ник или эмодзи" maxlength="20">
        <button class="enter-btn" onclick="enterITD()">ВОЙТИ</button>
    </div>
</div>

<header>
    <div id="logo">ИТД</div>
    <div id="user-name" style="color: #555;"></div>
</header>

<div id="feed"></div>

<div id="input-area">
    <input type="text" id="post-input" placeholder="Напиши что-нибудь...">
</div>

<script src="script.js"></script>
</body>
</html>
