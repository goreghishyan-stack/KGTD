<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelBattle.io :: [ALPHA]</title>
    <style>
        /* Основные стили (Темная тема) */
        body { 
            margin: 0; 
            background: #101010; /* Очень темный фон */
            color: #eeeeee; 
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- СКРИН ВХОДА --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98); /* Глубокий черный с прозрачностью */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            z-index: 1000;
            backdrop-filter: blur(10px); /* Красивое размытие фона */
        }
        
        #login-screen h1 { 
            font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; 
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-background-clip: text; background-clip: text; color: transparent; /* Радужный текст */
        }

        .login-input { 
            background: #1a1a1a; border: 2px solid #333; color: white; padding: 15px 25px; 
            border-radius: 30px; font-size: 1.2rem; width: 300px; text-align: center; 
            transition: 0.3s;
        }
        .login-input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 15px rgba(52, 152, 219, 0.5); }

        .btn-play { 
            margin-top: 25px; padding: 15px 40px; background: #3498db; color: white; 
            border: none; border-radius: 30px; font-size: 1.2rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-play:hover { background: #2980b9; transform: translateY(-3px); }

        /* --- ГЛАВНЫЙ HUD (Сверху) --- */
        .hud-header {
            background: rgba(25, 25, 25, 0.8); /* Полупрозрачная панель */
            backdrop-filter: blur(5px);
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            height: 60px;
        }

        .hud-left, .hud-right { display: flex; align-items: center; gap: 20px; }

        /* Красивый выбор цвета */
        .color-wrapper { position: relative; display: flex; align-items: center; gap: 10px; }
        input[type="color"] {
            -webkit-appearance: none; border: 2px solid #444; width: 45px; height: 45px; 
            cursor: pointer; border-radius: 10px; background: none; transition: 0.2s;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        input[type="color"]:hover { transform: scale(1.1); border-color: #666; }

        /* Таймер и Статус */
        .timer-container { font-size: 1.1rem; font-weight: bold; display: flex; gap: 10px; align-items: center; }
        #timer-display { color: #e74c3c; min-width: 140px; } /* Красный для таймера */
        #status { color: #aaaaaa; font-size: 0.9rem; }

        #nickname-display { color: #3498db; font-weight: bold; }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        #game-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        canvas {
            background: #ffffff; /* Белый холст */
            image-rendering: pixelated; /* Делает пиксели четкими */
            box-shadow: 0 0 50px rgba(0,0,0,0.7); /* Глубокая тень */
            border: 4px solid #2a2a2a;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Pixel Battle</h1>
        <input type="text" id="nickname" class="login-input" placeholder="Твой ник..." maxlength="15">
        <button onclick="startGame()" class="btn-play">Играть</button>
    </div>

    <div class="hud-header">
        <div class="hud-left">
            <div class="color-wrapper">
                <span>Цвет:</span>
                <input type="color" id="colorPicker" value="#ff0000">
            </div>
            <div class="timer-container">
                <span id="timer-display">ГОТОВ</span>
            </div>
        </div>
        <div class="hud-right">
            <div id="status">Загрузка...</div>
            <div id="nickname-display"></div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>

</body>
</html>
