<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGTD — Соцсеть</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #fff; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }

        /* Экраны */
        .screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.3s; }
        .hidden { display: none !important; }

        /* Авторизация */
        .auth-box { width: 90%; max-width: 320px; text-align: center; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main { background: #fff; color: #000; }
        .btn-outline { background: transparent; color: #fff; border: 1px solid #333; }

        /* Навигация (Нижнее меню) */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.9); 
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 15px; border-top: 1px solid #222; z-index: 500;
        }
        nav div { cursor: pointer; font-size: 20px; opacity: 0.5; transition: 0.3s; }
        nav div.active { opacity: 1; transform: translateY(-3px); }

        /* Контент */
        #main-container { max-width: 500px; margin: 0 auto; padding: 20px 15px 100px; }
        .post { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .clan-tag { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; }
        
        /* Поиск и группы */
        .page-title { font-size: 24px; font-weight: 900; margin-bottom: 20px; }
        .search-bar { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; }
    </style>
</head>
<body>

<div id="screen-auth" class="screen">
    <div class="auth-box">
        <h1>KGTD</h1>
        <div id="auth-initial">
            <button class="btn btn-main" onclick="showReg()">Создать аккаунт</button>
            <button id="btn-login" class="btn btn-outline hidden" onclick="fastLogin()">Войти как <span id="saved-name"></span></button>
        </div>
        
        <div id="auth-reg" class="hidden">
            <input type="text" id="nick-input" placeholder="Твой ник" class="search-bar" style="margin-bottom:10px">
            <div id="emoji-grid" style="display:grid; grid-template-columns: repeat(4,1fr); gap:10px; margin-bottom:15px"></div>
            <button class="btn btn-main" onclick="finishRegistration()">Начать</button>
        </div>
    </div>
</div>

<header style="padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
    <b id="page-name">Лента</b>
    <span id="my-identity" style="font-size: 12px; opacity: 0.5;"></span>
</header>

<div id="main-container">
    <div id="page-feed">
        <div id="posts-list"></div>
    </div>

    <div id="page-search" class="hidden">
        <h2 class="page-title">Поиск</h2>
        <input type="text" class="search-bar" placeholder="Найти друзей или кланы...">
        <p style="color:#444; margin-top:20px">Здесь будет список пользователей...</p>
    </div>
</div>

<nav>
    <div class="active" onclick="switchPage('feed', this)">🏠</div>
    <div onclick="switchPage('search', this)">🔍</div>
    <div onclick="switchPage('clan', this)">🛡️</div>
</nav>

<div id="input-wrap" style="position:fixed; bottom: 70px; width:100%; display:flex; justify-content:center; padding: 0 20px;">
    <input type="text" id="post-input" placeholder="Что нового?" class="search-bar" style="border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
</div>

<script src="script.js"></script>
</body>
</html>
