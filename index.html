<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Battle PRO</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #controls { background: #2c3e50; padding: 10px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid #34495e; position: relative; z-index: 10; }
        canvas { display: block; background: #000; cursor: crosshair; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #login-box { background: #34495e; padding: 30px; border-radius: 15px; text-align: center; }
        input[type="text"] { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        #pixel-info { 
            position: fixed; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; 
            border-radius: 5px; font-size: 13px; pointer-events: none; display: none; z-index: 1000; border: 1px solid #555;
        }
        #timer-display { font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

<div id="pixel-info"></div>

<div id="login-screen">
    <div id="login-box">
        <h1>PIXEL BATTLE</h1>
        <input type="text" id="nickname" placeholder="Твой ник...">
        <br>
        <button onclick="startGame()">ИГРАТЬ</button>
    </div>
</div>

<div id="controls">
    <input type="color" id="colorPicker" value="#ff0000">
    <div id="timer-display">ГОТОВ</div>
    <div id="user-display" style="font-size: 14px; color: #bdc3c7;"></div>
</div>

<canvas id="pixelCanvas"></canvas>

<script src="game.js"></script>
</body>
</html>
